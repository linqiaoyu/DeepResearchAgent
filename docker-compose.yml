services:
  api:
    build: .
    command: uvicorn deepresearch_agent.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DEEPRESEARCH_STORAGE_PATH: /app/data/runtime/research.db
      DEEPRESEARCH_LLM_LEDGER_PATH: /app/data/runtime/llm_ledger.jsonl
      DEEPRESEARCH_DEMO_GUARD_PATH: /app/data/runtime/demo_guard.json
      DEEPRESEARCH_SEARCH_PROVIDER: fixture
      DEEPRESEARCH_STRUCTURED_DATA_PROVIDER: fixture
    volumes:
      - ./data/runtime:/app/data/runtime
    restart: unless-stopped

  ui:
    build: .
    command: streamlit run ui/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - path: .env
        required: false
    environment:
      DEEPRESEARCH_STORAGE_PATH: /app/data/runtime/research.db
      DEEPRESEARCH_API_BASE_URL: http://api:8000
    volumes:
      - ./data/runtime:/app/data/runtime
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:15
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: deepresearch
      POSTGRES_PASSWORD: deepresearch
      POSTGRES_DB: deepresearch
    ports:
      - "5432:5432"
    volumes:
      - deepresearch_pg:/var/lib/postgresql/data

volumes:
  deepresearch_pg:
